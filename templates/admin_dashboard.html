{% extends 'dashboard.html' %}
{% load url_utils %}

{% block sidebar_nav %}
  <nav class="admin-sidebar-nav mt-6">
    {% with rm=request.resolver_match %}
      <a href="{% url_or_placeholder 'accounts:dashboard' %}" class="nav-link admin-nav-link {% if rm and rm.url_name == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">▣</span>
        <span>Dashboard</span>
      </a>
      <div class="mt-3">
        <a href="{% url 'accounts:manage_user' %}" class="nav-link admin-nav-link {% if rm and rm.url_name == 'manage_user' %}active{% endif %}">
          <span class="nav-icon">👤</span>
          <span>Manage Users</span>
        </a>
      </div>
      <div class="mt-3">
        <a href="{% url_or_placeholder 'transactions:admin_index' %}" class="nav-link admin-nav-link {% if rm and rm.url_name == 'admin_index' %}active{% endif %}">
          <span class="nav-icon">▣</span>
          <span>All Transactions</span>
        </a>
      </div>
      <div class="mt-3">
        <a href="{% url 'disputes:index' %}" class="nav-link admin-nav-link {% if rm and rm.namespace == 'disputes' %}active{% endif %}">
          <span class="nav-icon">△</span>
          <span>Disputes</span>
        </a>
      </div>
    {% endwith %}
  </nav>
{% endblock %}

{% block dashboard_main %}
  {% include 'admin_dashboard_section.html' %}
{% endblock %}
