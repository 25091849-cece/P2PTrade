{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2PTrade | Account Created</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
  <main class="min-h-screen flex items-center justify-center px-8 py-12">
    <section class="success-panel">
      <div class="success-icon" aria-hidden="true">✓</div>
      <h1 class="success-title">Account Created!</h1>
      <p class="success-lead">Welcome to P2PTRADE, {{ name|title }}!</p>
      <p class="success-copy">Your account has been successfully created with a starting balance.</p>

      <div class="success-balance-card">
        <p class="success-balance-label">Starting Balance</p>
        <div class="success-balance-grid">
          <div>
            <div class="success-balance-value">RM45,000</div>
            <div class="success-balance-currency">MYR</div>
          </div>
          <div>
            <div class="success-balance-value">$10,000</div>
            <div class="success-balance-currency">USD</div>
          </div>
        </div>
      </div>

      <a class="signin-button success-button" href="{% url 'login' %}">
        <span>Continue to Dashboard</span>
        <span class="button-arrow" aria-hidden="true">→</span>
      </a>
    </section>
  </main>
</body>
</html>
