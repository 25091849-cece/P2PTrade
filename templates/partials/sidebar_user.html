{% load url_utils %}
{% with rm=request.resolver_match %}
  <a href="{% url 'accounts:dashboard' %}"
     class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition
            {% if rm.url_name == 'dashboard' %}bg-p2p-accent text-p2p-bg{% else %}text-gray-300 hover:bg-p2p-card hover:text-white{% endif %}">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
    Dashboard
  </a>

  <a href="{% url 'wallets:index' %}"
     class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition
            {% if rm.namespace == 'wallets' %}bg-p2p-accent text-p2p-bg{% else %}text-gray-300 hover:bg-p2p-card hover:text-white{% endif %}">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 12m18 0v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 9m18 0V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v3"/></svg>
    Wallet
  </a>

  <a href="{% url 'marketplace:index' %}"
     class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition
            {% if rm.namespace == 'marketplace' %}bg-p2p-accent text-p2p-bg{% else %}text-gray-300 hover:bg-p2p-card hover:text-white{% endif %}">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
    Marketplace
  </a>

  <a href="{% url 'transactions:index' %}"
     class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition
            {% if rm.namespace == 'transactions' %}bg-p2p-accent text-p2p-bg{% else %}text-gray-300 hover:bg-p2p-card hover:text-white{% endif %}">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Transactions
  </a>
{% endwith %}
